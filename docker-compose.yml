services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: srs_user
      POSTGRES_PASSWORD: srs_pass
      POSTGRES_DB: srs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srs_user -d srs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
